version: "3.9"

services:
  php:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    container_name: notes_php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./backend/.env
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    container_name: notes_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  db:
    image: postgres:16-alpine
    container_name: notes_db
    environment:
      POSTGRES_DB: notes_website
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - notes_db_data:/var/lib/postgresql/data

volumes:
  notes_db_data:
